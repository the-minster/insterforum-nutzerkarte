name: Sync Google Sheet Data

on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch: 

# Erzwingt Node 24 für die v4 Action
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# GANZ WICHTIG: Erlaubt der Action, Dateien im Repo zu ändern
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download and Clean CSV
        run: |
          # 1. Download der kompletten Datei
          # Wir nutzen -f um bei Fehlern abzubrechen und -L für Weiterleitungen
          curl -f -L -o temp_full.csv "https://docs.google.com/spreadsheets/d/e/2PACX-1vTEOrp8a66YpZHfiVx5dcO-myl5_gq15hlzRIfAIx8XAA0xgPmJXYIxcH5tfwCCsqDXGZXG6jyQ5xmV/pub?gid=1124625812&single=true&output=csv"
          
          # 2. Intelligente Filterung mit Python
          python3 - <<EOF
          import csv
          with open('temp_full.csv', 'r', encoding='utf-8') as f:
              # Wir lesen die Datei ein (beachtet Anführungszeichen)
              reader = csv.reader(f)
              rows = list(reader)
          
          with open('data.csv', 'w', encoding='utf-8', newline='') as f:
              writer = csv.writer(f)
              for row in rows:
                  # Wir löschen Spalte 1 (Index 0) und Spalte 5 (Index 4)
                  # Wir bauen eine neue Zeile ohne diese Indizes
                  new_row = [val for i, val in enumerate(row) if i not in [0, 4]]
                  writer.writerow(new_row)
          EOF
         
          # 3. Aufräumen
          rm temp_full.csv

      - name: Commit and Push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv
          # Nur committen, wenn die Datei neu ist oder sich geändert hat
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Daten automatisch aktualisiert: $(date)"
            git push
          else
            echo "Keine Änderungen in den Daten gefunden."
          fi


