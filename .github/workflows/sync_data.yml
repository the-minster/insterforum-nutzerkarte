name: Sync Google Sheet Data

on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch: 

# Erzwingt Node 24 für die v4 Action
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# GANZ WICHTIG: Erlaubt der Action, Dateien im Repo zu ändern
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download and Filter CSV
        run: |
          # 1. Download der kompletten Datei
          # Wir nutzen -f um bei Fehlern abzubrechen und -L für Weiterleitungen
          curl -f -L -o temp_full.csv "https://docs.google.com/spreadsheets/d/e/2PACX-1vTEOrp8a66YpZHfiVx5dcO-myl5_gq15hlzRIfAIx8XAA0xgPmJXYIxcH5tfwCCsqDXGZXG6jyQ5xmV/pub?gid=1124625812&single=true&output=csv"
          
          # 2. Filtern: Wir behalten nur die gewünschten Spalten.
          # Beispiel: Wenn du Spalte 1 und 5 löschen willst, 
          # behältst du Feld 2-4 und 6 bis Ende.
          cut -d ',' -f 2,4,6-8 temp_full.csv > data.csv
          
          # 3. Temporäre Datei löschen
          rm temp_full.csv
          
      - name: Commit and Push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv
          # Nur committen, wenn die Datei neu ist oder sich geändert hat
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Daten automatisch aktualisiert: $(date)"
            git push
          else
            echo "Keine Änderungen in den Daten gefunden."
          fi


