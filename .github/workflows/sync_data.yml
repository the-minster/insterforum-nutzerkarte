name: Sync Google Sheet Data

on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch: 

# Erzwingt Node 24 für die v4 Action
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# GANZ WICHTIG: Erlaubt der Action, Dateien im Repo zu ändern
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download and Clean CSV
        run: |
          curl -f -L -o temp_full.csv "https://docs.google.com/spreadsheets/d/e/2PACX-1vTEOrp8a66YpZHfiVx5dcO-myl5_gq15hlzRIfAIx8XAA0xgPmJXYIxcH5tfwCCsqDXGZXG6jyQ5xmV/pub?gid=1124625812&single=true&output=csv"
          python3 - <<EOF
          import csv
          with open('temp_full.csv', 'r', encoding='utf-8') as f:
              reader = csv.reader(f)
              rows = list(reader)
          
          with open('data.csv', 'w', encoding='utf-8', newline='') as f:
              writer = csv.writer(f)
              for row in rows:
                  # Wir greifen nur die Indizes 1, 3, 5, 6, 7 ab
                  # Falls eine Zeile (z.B. leer) weniger Spalten hat, überspringen wir sie
                  try:
                      new_row = [row[1], row[3], row[5], row[6], row[7]]
                      writer.writerow(new_row)
                  except IndexError:
                      continue
          EOF
          
          rm temp_full.csv

      - name: Commit and Push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv
          # Nur committen, wenn die Datei neu ist oder sich geändert hat
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Daten automatisch aktualisiert: $(date)"
            git push
          else
            echo "Keine Änderungen in den Daten gefunden."
          fi


